<!DOCTYPE html>
<html lang="uk">
<head>

<body>
<!-- ===== NAVBAR ===== -->
<nav class="navbar" id="navbar">
    <div class="navbar-inner">
        <div class="navbar-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            🗳️ <span>Вибори Мера</span>
        </div>
        <div class="navbar-links">
            <a onclick="scrollToList()">Кандидати</a>
            <a onclick="document.getElementById('chart-section').scrollIntoView({behavior:'smooth'})">Аналітика</a>
            <a onclick="scrollToVoting()">Голосування</a>
            <a onclick="scrollToForm()" class="navbar-cta">+ Подати заявку</a>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Змінити тему">☀️</button>
        <button class="navbar-burger" id="navbar-burger" onclick="toggleMenu()">☰</button>
    </div>
    <div class="navbar-mobile" id="navbar-mobile">
        <a onclick="scrollToList();toggleMenu()">Кандидати</a>
        <a onclick="document.getElementById('chart-section').scrollIntoView({behavior:'smooth'});toggleMenu()">Аналітика</a>
        <a onclick="scrollToVoting();toggleMenu()">Голосування</a>
        <a onclick="scrollToForm();toggleMenu()" class="navbar-cta-mobile">+ Подати заявку</a>
    </div>
</nav>


<!-- ===== TOAST CONTAINER ===== -->
<div id="toast-container"></div>

<!-- ===== MODAL: PASSWORD ===== -->
<div class="modal-overlay" id="modal-password">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-password')">✕</button>
        <div class="modal-icon">🔐</div>
        <h3 class="modal-title" id="modal-password-title">Підтвердження</h3>
        <p class="modal-desc" id="modal-password-desc">Введіть пароль адміністратора</p>
        <input type="password" class="modal-input" id="modal-password-input" placeholder="Пароль...">
        <div class="modal-btns">
            <button class="modal-btn-cancel" onclick="closeModal('modal-password')">Скасувати</button>
            <button class="modal-btn-confirm" id="modal-password-confirm">Підтвердити</button>
        </div>
    </div>
</div>

<!-- ===== MODAL: EDIT ===== -->
<div class="modal-overlay" id="modal-edit">
    <div class="modal modal-wide">
        <button class="modal-close" onclick="closeModal('modal-edit')">✕</button>
        <div class="modal-icon">✏️</div>
        <h3 class="modal-title">Редагувати кандидата</h3>
        <div class="modal-form">
            <div class="field-group">
                <label>ПІБ кандидата</label>
                <input type="text" id="edit-name" placeholder="Іваненко Іван Іванович" autocomplete="off">
                <span class="field-error" id="edit-name-error"></span>
            </div>
            <div class="field-group">
                <label>Дата народження</label>
                <input type="text" id="edit-birthDate" placeholder="16.04.1975" maxlength="10">
                <span class="field-error" id="edit-birthDate-error"></span>
            </div>
            <div class="field-group">
                <label>Місце народження</label>
                <input type="text" id="edit-birthPlace" placeholder="Київ" autocomplete="off">
                <span class="field-error" id="edit-birthPlace-error"></span>
            </div>
            <div class="field-group">
                <label>Індекс популярності</label>
                <select id="edit-popularityIndex">
                    <option value="70">Підтриманий президентом (70)</option>
                    <option value="15">Підтриманий опозицією (15)</option>
                    <option value="10">Знімає кандидатуру на користь №1 (10)</option>
                    <option value="5">Інші (5)</option>
                </select>
            </div>
            <div class="field-group">
                <label>Пароль адміністратора</label>
                <input type="password" id="edit-password" placeholder="Пароль...">
                <span class="field-error" id="edit-password-error"></span>
            </div>
        </div>
        <div class="modal-btns">
            <button class="modal-btn-cancel" onclick="closeModal('modal-edit')">Скасувати</button>
            <button class="modal-btn-confirm" onclick="submitEdit()">Зберегти зміни</button>
        </div>
    </div>
</div>
